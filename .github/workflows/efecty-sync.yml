name: Conciliar recaudos Efecty

on:
  workflow_dispatch:

# Programado ahora en Railway Cron. Este workflow queda como respaldo manual.

concurrency:
  group: efecty-sync
  cancel-in-progress: false

jobs:
  sync-efecty:
    name: Descargar TXT y aplicar recaudos
    runs-on: ubuntu-latest

    steps:
      - name: Conciliar recaudos Efecty
        env:
          FINSERPAY_BASE_URL: ${{ secrets.FINSERPAY_BASE_URL }}
          EFECTY_SYNC_TOKEN: ${{ secrets.EFECTY_SYNC_TOKEN }}
          MORA_SYNC_TOKEN: ${{ secrets.MORA_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          BASE_URL="${FINSERPAY_BASE_URL:-https://finserpay.com}"
          TOKEN="${EFECTY_SYNC_TOKEN:-${MORA_SYNC_TOKEN:-}}"

          if [ -z "${TOKEN}" ]; then
            echo "Falta configurar EFECTY_SYNC_TOKEN o MORA_SYNC_TOKEN en GitHub Actions."
            exit 1
          fi

          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer ${TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"dryRun":false,"limitFiles":10,"includePreviousFiles":false}' \
            "${BASE_URL%/}/api/efecty/sync"
