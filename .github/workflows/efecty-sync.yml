name: Conciliar recaudos Efecty

on:
  workflow_dispatch:
    inputs:
      file_date:
        description: "Fecha del TXT a procesar en formato YYYYMMDD. Dejalo vacio para usar el dia actual."
        required: false
        type: string
  schedule:
    # Respaldo entre 23:00 y 01:45 Colombia. La ventana amplia recupera archivos tardios o caidas temporales.
    - cron: "*/15 4,5,6 * * *"

# Programado tambien en Railway. Este workflow queda como respaldo automatico.

concurrency:
  group: efecty-sync
  cancel-in-progress: false

jobs:
  sync-efecty:
    name: Descargar TXT y aplicar recaudos
    runs-on: ubuntu-latest

    steps:
      - name: Conciliar recaudos Efecty
        env:
          FINSERPAY_BASE_URL: ${{ secrets.FINSERPAY_BASE_URL }}
          EFECTY_SYNC_TOKEN: ${{ secrets.EFECTY_SYNC_TOKEN }}
          MORA_SYNC_TOKEN: ${{ secrets.MORA_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          BASE_URL="${FINSERPAY_BASE_URL:-https://finserpay.com}"
          TOKEN="${EFECTY_SYNC_TOKEN:-${MORA_SYNC_TOKEN:-}}"
          FILE_DATE="${{ github.event.inputs.file_date || '' }}"

          if [ -z "${TOKEN}" ]; then
            echo "Falta configurar EFECTY_SYNC_TOKEN o MORA_SYNC_TOKEN en GitHub Actions."
            exit 1
          fi

          if [ -n "${FILE_DATE}" ] && ! echo "${FILE_DATE}" | grep -Eq '^[0-9]{8}$'; then
            echo "file_date debe tener formato YYYYMMDD, por ejemplo 20260604."
            exit 1
          fi

          sync_date() {
            local target_date="$1"
            local response_file
            response_file="$(mktemp)"

            echo "Conciliando archivo Efecty de ${target_date}."
            curl --fail-with-body \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 10 \
              --connect-timeout 30 \
              --max-time 180 \
              --request POST \
              --header "Authorization: Bearer ${TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"dryRun\":false,\"limitFiles\":10,\"includePreviousFiles\":false,\"fileDate\":\"${target_date}\"}" \
              --output "${response_file}" \
              "${BASE_URL%/}/api/efecty/sync"

            cat "${response_file}"
            echo

            if [ "$(jq -r '.ok // false' "${response_file}")" != "true" ]; then
              echo "La conciliacion de ${target_date} reporto errores."
              exit 1
            fi

            rm -f "${response_file}"
          }

          if [ -n "${FILE_DATE}" ]; then
            sync_date "${FILE_DATE}"
          else
            TODAY_BOGOTA="$(TZ=America/Bogota date +%Y%m%d)"
            YESTERDAY_BOGOTA="$(TZ=America/Bogota date --date='yesterday' +%Y%m%d)"
            sync_date "${TODAY_BOGOTA}"
            sync_date "${YESTERDAY_BOGOTA}"
          fi
